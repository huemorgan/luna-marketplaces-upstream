# Data manifest — the marketplace + Luna's installer read this WITHOUT importing
# the plugin's Python. Keep in sync with the manifest in __init__.py.
# This is the thin front edge of the versioned SDK's manifest-as-data (E1).

name = "hello-world"
version = "0.1.0"
description = "The first marketplace-installed Luna plugin. Says hello."
entry = "hello_world"          # package dir containing __init__.py
sdk_version = "0"
license = "MIT"
tags = ["demo", "starter"]
readme = """
# hello-world

The first plugin published to the **Luna Official (dev)** marketplace.

It registers a single tool, `hello_world`, that returns a friendly greeting —
proof that a plugin authored against `luna_sdk` alone can be packaged, hosted,
fetched, hash-verified, and loaded by a real Luna agent.

## Tool

- `hello_world(name="world")` -> `{"greeting": "Hello, <name>! - from the marketplace"}`

No database, no routes, no UI, no dependencies. A pure leaf plugin.
"""

# Capabilities this plugin needs from the host. Display + future compat gate.
[requires]
tools = 1

[[tools]]
name = "hello_world"
description = "Return a friendly greeting."
policy = "auto_approve"
risk_level = "low"
