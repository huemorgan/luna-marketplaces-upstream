name = "hello-world-2"
version = "0.1.0"
description = "A second marketplace plugin. Says hello again."
entry = "hello_world_2"
sdk_version = "0"
license = "MIT"
tags = ["demo", "starter"]
readme = """
# hello-world-2

The second plugin in the **Luna Official (dev)** marketplace. Proof that the
catalog grows: a new plugin lands in Luna's Marketplace pane next to
`hello-world`, installable the same way.

## Tool

- `hello_world_2(name="world")` -> `{"greeting": "Hello again, <name>! — from the marketplace 🚀"}`

No database, no routes, no UI. A pure leaf plugin built against `luna_sdk` v0.
"""

[requires]
tools = 1

[[tools]]
name = "hello_world_2"
description = "Return a second friendly greeting."
policy = "auto_approve"
risk_level = "low"
