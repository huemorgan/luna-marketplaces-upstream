<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connectors</title>
  <style>
    :root {
      --ink-950:#0a0b10; --ink-900:#11131b; --ink-800:#1a1d28; --ink-700:#272b39;
      --ink-600:#3a3f50; --ink-500:#6b7280; --ink-400:#9ca3af; --ink-300:#c3c8d2;
      --ink-200:#d6dae2; --ink-100:#e5e7eb; --ink-50:#f3f4f6;
      --luna-600:#6d5efc; --luna-500:#8b7bff; --luna-400:#a89bff; --luna-300:#c2b8ff;
      --green:#34d399; --sky:#38bdf8; --amber:#fbbf24; --red:#f87171;
    }
    * { box-sizing:border-box; }
    html,body { margin:0; padding:0; background:transparent; }
    body { font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      color:var(--ink-50); padding:2rem; max-width:48rem; }
    h1 { font-size:1.15rem; font-weight:600; margin:0 0 .25rem; }
    .sub { color:var(--ink-400); font-size:.85rem; margin:0 0 1.5rem; line-height:1.5; }
    h3 { color:var(--ink-200); font-size:.85rem; font-weight:500; margin:0 0 .75rem; }
    a { color:var(--luna-400); }
    code { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
    .err { margin-bottom:1rem; font-size:.85rem; color:#fecaca; background:rgba(127,29,29,.3);
      border:1px solid rgba(153,27,27,.5); border-radius:.5rem; padding:.65rem .75rem; white-space:pre-wrap; word-break:break-word; }
    .card { background:rgba(17,19,27,.4); border:1px solid rgba(255,255,255,.06); border-radius:.75rem; }
    .muted { color:var(--ink-400); font-size:.85rem; }
    .row { display:flex; align-items:center; gap:.75rem; }
    .logo { width:2.25rem; height:2.25rem; border-radius:.5rem; flex:none; display:flex; align-items:center; justify-content:center;
      background:var(--ink-800); color:var(--ink-400); object-fit:contain; }
    img.logo { background:rgba(255,255,255,.9); padding:.25rem; }
    .grow { min-width:0; flex:1; }
    .nm { color:var(--ink-50); font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .desc { color:var(--ink-400); font-size:.8rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:.1rem; }
    .pill { font-size:.7rem; border-radius:1rem; padding:.1rem .55rem; border:1px solid transparent; white-space:nowrap; }
    .pill.green { background:rgba(34,197,94,.12); color:#86efac; border-color:rgba(34,197,94,.3); }
    .badge-connected { font-size:.7rem; padding:.15rem .5rem; border-radius:.35rem; background:rgba(20,83,45,.5); color:#86efac; border:1px solid rgba(22,101,52,.5); white-space:nowrap; flex:none; }
    button.primary,button.ghost,button.outline { display:inline-flex; align-items:center; gap:.4rem; border-radius:.5rem;
      font-size:.8rem; font-weight:500; padding:.45rem .8rem; cursor:pointer; border:1px solid transparent; transition:background .15s,opacity .15s,border-color .15s; }
    button.primary { background:var(--luna-600); color:#fff; } button.primary:hover { background:var(--luna-500); }
    button.ghost { background:var(--ink-800); color:var(--ink-100); } button.ghost:hover { background:var(--ink-700); }
    button.outline { background:transparent; color:var(--ink-300); border-color:rgba(195,200,210,.4); }
    button.outline:hover { color:var(--red); border-color:rgba(248,113,113,.5); background:rgba(248,113,113,.06); }
    button:disabled { opacity:.45; cursor:default; }
    .linkbtn { background:none; border:none; color:var(--ink-500); cursor:pointer; font-size:.72rem; text-decoration:underline; padding:0; }
    .linkbtn:hover { color:var(--red); }
    input { width:100%; background:var(--ink-950); border:1px solid rgba(255,255,255,.1); border-radius:.5rem;
      padding:.6rem .7rem; color:var(--ink-50); font-size:.85rem; }
    input:focus { outline:none; border-color:var(--luna-500); box-shadow:0 0 0 2px rgba(139,123,255,.25); }
    input::placeholder { color:var(--ink-500); }
    label .lbl { display:block; font-size:.78rem; color:var(--ink-300); margin-bottom:.35rem; }
    .section { margin-bottom:1.5rem; }
    .list > * + * { margin-top:.6rem; }
    .hdr { padding:1rem; cursor:pointer; user-select:none; }
    .details { border-top:1px solid rgba(255,255,255,.05); padding:.85rem 1rem; }
    .details > * + * { margin-top:1rem; }
    .toggle-line { display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; }
    .toggle-line .t-title { color:var(--ink-200); font-size:.78rem; font-weight:500; }
    .toggle-line .t-sub { color:var(--ink-500); font-size:.72rem; margin-top:.15rem; line-height:1.4; }
    .toggle { position:relative; width:2rem; height:1.125rem; border-radius:1rem; border:none; cursor:pointer; flex:none; background:var(--ink-700); transition:background .15s; }
    .toggle.on { background:var(--luna-500); }
    .toggle:disabled { opacity:.4; cursor:default; }
    .toggle .knob { position:absolute; top:.125rem; left:.125rem; width:.875rem; height:.875rem; border-radius:50%; background:#fff; transition:left .15s; }
    .toggle.on .knob { left:.95rem; }
    .acct { font-size:.78rem; color:var(--ink-300); }
    .acct .meta { font-size:.7rem; color:var(--ink-500); margin-top:.2rem; }
    .chevron { color:var(--ink-500); flex:none; transition:transform .15s; }
    .chevron.open { transform:rotate(180deg); }
    .spinner { width:1rem; height:1rem; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%;
      animation:spin .7s linear infinite; display:inline-block; vertical-align:middle; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .toolbar { display:flex; gap:.5rem; margin-bottom:.75rem; }
    .toolbar .grow { position:relative; }
    .src-row { display:flex; align-items:center; justify-content:space-between; gap:.75rem; padding:.7rem 1rem; }
    .keyform > * + * { margin-top:.75rem; }
    .field-err { color:#fca5a5; font-size:.78rem; word-break:break-word; }
    .req { color:var(--red); }
    @keyframes glow-on { 0% { box-shadow:0 0 16px 6px rgba(34,197,94,.9); } 100% { box-shadow:0 0 0 0 rgba(34,197,94,0); } }
    @keyframes glow-off { 0% { box-shadow:0 0 16px 6px rgba(59,130,246,.9); } 100% { box-shadow:0 0 0 0 rgba(59,130,246,0); } }
  </style>
</head>
<body>
  <h1>Connectors</h1>
  <p class="sub">Connect Luna to hundreds of platforms — CRMs, email, project management, dev tools — with managed authentication.</p>
  <div id="error" class="err" style="display:none"></div>
  <div id="root"><div class="muted"><span class="spinner"></span> Loading…</div></div>
  <script src="./app.js"></script>
</body>
</html>
