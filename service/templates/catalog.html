<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Marketplace — Plugin Catalog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f13;
            --surface: #1a1a22;
            --surface-hover: #22222e;
            --border: #2a2a36;
            --text: #e8e8ed;
            --text-muted: #8b8b9e;
            --accent: #7c6cf0;
            --accent-glow: rgba(124, 108, 240, 0.15);
            --green: #4ade80;
            --amber: #fbbf24;
            --red: #f87171;
            --blue: #60a5fa;
            --radius: 12px;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }
        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .search-bar {
            flex: 1;
            max-width: 500px;
            margin: 0 2rem;
            position: relative;
        }
        .search-bar input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-bar input:focus { border-color: var(--accent); }
        .search-bar::before {
            content: '🔍';
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.85rem;
        }
        .main { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .filters {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            align-items: center;
        }
        .filter-chip {
            padding: 0.4rem 0.9rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-muted);
        }
        .filter-chip:hover, .filter-chip.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }
        .filter-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px var(--accent);
        }
        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .card-title-area { flex: 1; min-width: 0; }
        .card-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.15rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-namespace {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .card-version {
            font-size: 0.7rem;
            color: var(--accent);
            background: var(--accent-glow);
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-weight: 500;
        }
        .card-description {
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }
        .tag {
            font-size: 0.7rem;
            padding: 0.2rem 0.55rem;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            color: var(--text-muted);
        }
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }
        .card-badges {
            display: flex;
            gap: 0.5rem;
        }
        .badge {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 0.2rem 0.5rem;
            background: rgba(255,255,255,0.03);
            border-radius: 4px;
        }
        .badge.tools { color: var(--blue); }
        .badge.ui { color: var(--green); }
        .badge.vault { color: var(--amber); }
        .badge.egress { color: var(--red); }
        .card-downloads {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .card-license {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            font-weight: 600;
        }
        .card-license.mit { background: rgba(74, 222, 128, 0.1); color: var(--green); }
        .card-license.commercial { background: rgba(251, 191, 36, 0.1); color: var(--amber); }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        .empty-state h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text); }
        .stats {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            padding: 1.25rem 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .search-bar { margin: 1rem 0 0; max-width: 100%; }
            .header-inner { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">🌙</div>
                <span>Luna Marketplace</span>
            </div>
            <div class="search-bar">
                <input type="text" id="search" placeholder="Search plugins..." oninput="filterPlugins()">
            </div>
            <div style="color: var(--text-muted); font-size: 0.8rem;">marketplaces.com.ai</div>
        </div>
    </header>

    <main class="main">
        <div class="stats" id="stats"></div>

        <div class="filters" id="filters">
            <span class="filter-label">Filter:</span>
            <span class="filter-chip" data-filter="all" onclick="setFilter('all')">All</span>
            <span class="filter-chip" data-filter="tools" onclick="setFilter('tools')">Has Tools</span>
            <span class="filter-chip" data-filter="ui" onclick="setFilter('ui')">UI Widget</span>
            <span class="filter-chip" data-filter="settings" onclick="setFilter('settings')">Settings Tab</span>
            <span class="filter-chip" data-filter="vault" onclick="setFilter('vault')">Vault Access</span>
            <span class="filter-chip" data-filter="mit" onclick="setFilter('mit')">MIT</span>
            <span class="filter-chip" data-filter="commercial" onclick="setFilter('commercial')">Commercial</span>
        </div>

        <div class="grid" id="plugins-grid"></div>
        <div class="empty-state" id="empty-state" style="display:none;">
            <h3>No plugins found</h3>
            <p>Try adjusting your filters or search terms</p>
        </div>
    </main>

    <script>
        let allPlugins = [];
        let activeFilter = 'all';
        const mpSlug = window.location.pathname.split('/marketplace/')[1] || 'official';

        const ICONS = ['🔧','📊','🔌','🧠','💬','📁','🔐','🎨','📈','⚡','🌐','📋','🛡️','🔔','📦'];

        function getPluginIcon(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash) + name.charCodeAt(i);
            return ICONS[Math.abs(hash) % ICONS.length];
        }

        async function loadPlugins() {
            try {
                const res = await fetch(`/api/catalog/${mpSlug}`);
                if (!res.ok) throw new Error('Failed to load');
                allPlugins = await res.json();
                renderStats();
                renderPlugins(allPlugins);
                document.querySelector('[data-filter="all"]').classList.add('active');
            } catch(e) {
                document.getElementById('plugins-grid').innerHTML = '';
                document.getElementById('empty-state').style.display = 'block';
            }
        }

        function renderStats() {
            const stats = document.getElementById('stats');
            const tools = allPlugins.filter(p => p.requires_tools).length;
            const ui = allPlugins.filter(p => p.requires_ui_iframe).length;
            stats.innerHTML = `
                <div class="stat"><div class="stat-value">${allPlugins.length}</div><div class="stat-label">Plugins</div></div>
                <div class="stat"><div class="stat-value">${tools}</div><div class="stat-label">With Tools</div></div>
                <div class="stat"><div class="stat-value">${ui}</div><div class="stat-label">With UI</div></div>
                <div class="stat"><div class="stat-value">${new Set(allPlugins.flatMap(p=>p.tags)).size}</div><div class="stat-label">Tags</div></div>
            `;
        }

        function renderPlugins(plugins) {
            const grid = document.getElementById('plugins-grid');
            const empty = document.getElementById('empty-state');

            if (plugins.length === 0) {
                grid.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            grid.innerHTML = plugins.map(p => `
                <div class="card" onclick="window.location='/marketplace/${mpSlug}/plugin/${p.name}'">
                    <div class="card-header">
                        <div class="card-icon">${p.icon_url || getPluginIcon(p.name)}</div>
                        <div class="card-title-area">
                            <div class="card-name">${p.name}</div>
                            <div class="card-namespace">${p.namespace}/${p.name}</div>
                        </div>
                        ${p.latest_version ? `<span class="card-version">v${p.latest_version}</span>` : ''}
                    </div>
                    <div class="card-description">${p.description || 'No description'}</div>
                    <div class="card-tags">
                        ${(p.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                    <div class="card-footer">
                        <div class="card-badges">
                            ${p.tool_count > 0 ? `<span class="badge tools">⚡ ${p.tool_count} tool${p.tool_count > 1 ? 's' : ''}</span>` : ''}
                            ${p.requires_ui_iframe ? '<span class="badge ui">🖼 UI</span>' : ''}
                            ${p.requires_settings_tab ? '<span class="badge ui">⚙ Settings</span>' : ''}
                            ${p.requires_vault_access ? '<span class="badge vault">🔐 Vault</span>' : ''}
                            ${(p.requires_egress || []).length > 0 ? `<span class="badge egress">🌐 Egress</span>` : ''}
                        </div>
                        <span class="card-license ${p.license.toLowerCase()}">${p.license}</span>
                    </div>
                </div>
            `).join('');
        }

        function filterPlugins() {
            const search = document.getElementById('search').value.toLowerCase();
            let filtered = allPlugins;

            if (search) {
                filtered = filtered.filter(p =>
                    p.name.toLowerCase().includes(search) ||
                    p.description.toLowerCase().includes(search) ||
                    (p.tags || []).some(t => t.toLowerCase().includes(search))
                );
            }

            if (activeFilter !== 'all') {
                switch(activeFilter) {
                    case 'tools': filtered = filtered.filter(p => p.requires_tools); break;
                    case 'ui': filtered = filtered.filter(p => p.requires_ui_iframe); break;
                    case 'settings': filtered = filtered.filter(p => p.requires_settings_tab); break;
                    case 'vault': filtered = filtered.filter(p => p.requires_vault_access); break;
                    case 'mit': filtered = filtered.filter(p => p.license === 'MIT'); break;
                    case 'commercial': filtered = filtered.filter(p => p.license === 'Commercial'); break;
                }
            }

            renderPlugins(filtered);
        }

        function setFilter(filter) {
            activeFilter = filter;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            document.querySelector(`[data-filter="${filter}"]`).classList.add('active');
            filterPlugins();
        }

        loadPlugins();
    </script>
</body>
</html>
