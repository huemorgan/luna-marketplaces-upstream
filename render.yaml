services:
  - type: web
    name: luna-marketplaces
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    disk:
      name: luna-mp-artifacts
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: luna-mp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_ENV
        value: production
      - key: ARTIFACTS_DIR
        value: /data/artifacts
      - key: MARKETPLACE_SRC
        value: /app/marketplace-src

databases:
  - name: luna-mp-db
    plan: starter
    region: oregon
    databaseName: luna_marketplaces
    user: luna_mp
